# =============================================================================
# Google Cloud Build Configuration
# CI/CD pipeline for Market Intelligence Platform
#
# Trigger this from GitHub push or manually:
#   gcloud builds submit --config cloudbuild.yaml
# =============================================================================

steps:
  # Build Airflow container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.airflow'
      - '-t'
      - 'gcr.io/$PROJECT_ID/airflow:$_COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/airflow:latest'
      - '.'
    id: 'build-airflow'

  # Build MLflow container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.mlflow'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mlflow:$_COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mlflow:latest'
      - '.'
    id: 'build-mlflow'

  # Build API container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'docker/Dockerfile.api'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api:$_COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api:latest'
      - '.'
    id: 'build-api'

  # Push Airflow container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/airflow:$_COMMIT_SHA']
    id: 'push-airflow'
    waitFor: ['build-airflow']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/airflow:latest']
    waitFor: ['build-airflow']

  # Push MLflow container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mlflow:$_COMMIT_SHA']
    id: 'push-mlflow'
    waitFor: ['build-mlflow']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mlflow:latest']
    waitFor: ['build-mlflow']

  # Push API container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api:$_COMMIT_SHA']
    id: 'push-api'
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api:latest']
    waitFor: ['build-api']

  # Deploy API to Cloud Run (main service for predictions)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'market-intel-api'
      - '--image=gcr.io/$PROJECT_ID/api:$_COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--allow-unauthenticated'
    id: 'deploy-api'
    waitFor: ['push-api']

  # Deploy MLflow to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'market-intel-mlflow'
      - '--image=gcr.io/$PROJECT_ID/mlflow:$_COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--allow-unauthenticated'
    id: 'deploy-mlflow'
    waitFor: ['push-mlflow']

  # NOTE: Airflow deployment skipped - requires Cloud SQL for database
  # To deploy Airflow to Cloud Run, you need:
  # 1. Create Cloud SQL instance
  # 2. Add Cloud SQL proxy to Cloud Run
  # For now, run Airflow locally: docker-compose up -d airflow-webserver

# Store built images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/airflow:$_COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/airflow:latest'
  - 'gcr.io/$PROJECT_ID/mlflow:$_COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mlflow:latest'
  - 'gcr.io/$PROJECT_ID/api:$_COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/api:latest'

# Build configuration
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout for the entire build
timeout: '1800s'

# Substitutions (can be overridden)
substitutions:
  _COMMIT_SHA: 'latest'
