# =============================================================================
# Google Cloud Build Configuration
# CI/CD pipeline for Market Intelligence Platform
#
# Trigger: GitHub push or manual
#   gcloud builds submit --config cloudbuild.yaml
#
# Prerequisites:
#   - Cloud SQL instance "market-intel-db" with databases: airflow, mlflow
#   - GCS bucket "$PROJECT_ID-ml-artifacts"
#   - Run: ./scripts/deploy-gcp.sh setup-db (to create Cloud SQL)
# =============================================================================

steps:
  # Build all containers in parallel
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--platform', 'linux/amd64', '-f', 'docker/Dockerfile.airflow',
           '-t', 'gcr.io/$PROJECT_ID/airflow:$COMMIT_SHA',
           '-t', 'gcr.io/$PROJECT_ID/airflow:latest', '.']
    id: 'build-airflow'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--platform', 'linux/amd64', '-f', 'docker/Dockerfile.mlflow',
           '-t', 'gcr.io/$PROJECT_ID/mlflow:$COMMIT_SHA',
           '-t', 'gcr.io/$PROJECT_ID/mlflow:latest', '.']
    id: 'build-mlflow'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--platform', 'linux/amd64', '-f', 'docker/Dockerfile.api',
           '-t', 'gcr.io/$PROJECT_ID/api:$COMMIT_SHA',
           '-t', 'gcr.io/$PROJECT_ID/api:latest', '.']
    id: 'build-api'

  # Push all containers
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/airflow:$COMMIT_SHA']
    id: 'push-airflow'
    waitFor: ['build-airflow']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/airflow:latest']
    waitFor: ['build-airflow']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mlflow:$COMMIT_SHA']
    id: 'push-mlflow'
    waitFor: ['build-mlflow']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mlflow:latest']
    waitFor: ['build-mlflow']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api:$COMMIT_SHA']
    id: 'push-api'
    waitFor: ['build-api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api:latest']
    waitFor: ['build-api']

  # Deploy MLflow first (other services need its URL)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        SQL_CONN="$PROJECT_ID:${_REGION}:market-intel-db"
        gcloud run deploy market-intel-mlflow \
          --image=gcr.io/$PROJECT_ID/mlflow:$COMMIT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --memory=1Gi --cpu=1 \
          --min-instances=0 --max-instances=1 \
          --set-env-vars="MLFLOW_BACKEND_URI=postgresql+psycopg2://postgres:postgres@/mlflow?host=/cloudsql/$${SQL_CONN},MLFLOW_ARTIFACT_ROOT=gs://$PROJECT_ID-ml-artifacts" \
          --add-cloudsql-instances="$${SQL_CONN}" \
          --allow-unauthenticated
    id: 'deploy-mlflow'
    waitFor: ['push-mlflow']

  # Get MLflow URL for other services
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run services describe market-intel-mlflow \
          --region=${_REGION} --format='value(status.url)' > /workspace/mlflow_url.txt
    id: 'get-mlflow-url'
    waitFor: ['deploy-mlflow']

  # Deploy Airflow webserver
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        SQL_CONN="$PROJECT_ID:${_REGION}:market-intel-db"
        MLFLOW_URL=$$(cat /workspace/mlflow_url.txt)
        gcloud run deploy market-intel-airflow \
          --image=gcr.io/$PROJECT_ID/airflow:$COMMIT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --memory=2Gi --cpu=2 \
          --min-instances=0 --max-instances=1 \
          --timeout=3600 \
          --set-env-vars="AIRFLOW_MODE=webserver,AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@/airflow?host=/cloudsql/$${SQL_CONN},AIRFLOW__CORE__EXECUTOR=LocalExecutor,AIRFLOW__CORE__LOAD_EXAMPLES=False,AIRFLOW__WEBSERVER__SECRET_KEY=market-intel-secret-key-change-me,AIRFLOW_WWW_USER_USERNAME=admin,AIRFLOW_WWW_USER_PASSWORD=admin,MLFLOW_TRACKING_URI=$${MLFLOW_URL}" \
          --add-cloudsql-instances="$${SQL_CONN}" \
          --allow-unauthenticated
    id: 'deploy-airflow-web'
    waitFor: ['push-airflow', 'get-mlflow-url']

  # Deploy Airflow scheduler (always-on, no public access)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        SQL_CONN="$PROJECT_ID:${_REGION}:market-intel-db"
        MLFLOW_URL=$$(cat /workspace/mlflow_url.txt)
        gcloud run deploy market-intel-airflow-scheduler \
          --image=gcr.io/$PROJECT_ID/airflow:$COMMIT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --memory=2Gi --cpu=2 \
          --min-instances=1 --max-instances=1 \
          --timeout=3600 \
          --no-cpu-throttling \
          --set-env-vars="AIRFLOW_MODE=scheduler,AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@/airflow?host=/cloudsql/$${SQL_CONN},AIRFLOW__CORE__EXECUTOR=LocalExecutor,AIRFLOW__CORE__LOAD_EXAMPLES=False,AIRFLOW__WEBSERVER__SECRET_KEY=market-intel-secret-key-change-me,MLFLOW_TRACKING_URI=$${MLFLOW_URL}" \
          --add-cloudsql-instances="$${SQL_CONN}" \
          --no-allow-unauthenticated
    id: 'deploy-airflow-scheduler'
    waitFor: ['push-airflow', 'get-mlflow-url']

  # Deploy API
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        MLFLOW_URL=$$(cat /workspace/mlflow_url.txt)
        gcloud run deploy market-intel-api \
          --image=gcr.io/$PROJECT_ID/api:$COMMIT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --memory=2Gi --cpu=2 \
          --min-instances=0 --max-instances=10 \
          --set-env-vars="DEMO_MODE=true,MLFLOW_TRACKING_URI=$${MLFLOW_URL}" \
          --allow-unauthenticated
    id: 'deploy-api'
    waitFor: ['push-api', 'get-mlflow-url']

images:
  - 'gcr.io/$PROJECT_ID/airflow:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/airflow:latest'
  - 'gcr.io/$PROJECT_ID/mlflow:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/mlflow:latest'
  - 'gcr.io/$PROJECT_ID/api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

substitutions:
  _REGION: 'us-west1'
